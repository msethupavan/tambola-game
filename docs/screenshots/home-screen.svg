<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-label="Tambola Home Screen">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9fafb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3f4f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="secondaryBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="800" fill="url(#bgGrad)"/>
  
  <!-- Card -->
  <rect x="200" y="60" width="880" height="680" rx="24" fill="white" filter="url(#cardShadow)" stroke="#e5e7eb" stroke-width="1"/>
  
  <!-- Title -->
  <text x="640" y="160" font-family="'Segoe UI', Arial" font-size="64" font-weight="800" text-anchor="middle" fill="url(#titleGrad)">🎲 Tambola Game</text>
  
  <!-- Subtitle -->
  <text x="640" y="220" font-family="'Segoe UI', Arial" font-size="22" text-anchor="middle" fill="#64748b" font-weight="500">Play Tambola with friends over WiFi</text>
  
  <!-- Primary Button -->
  <rect x="320" y="280" width="420" height="60" rx="14" fill="url(#primaryBtn)" filter="url(#cardShadow)"/>
  <text x="530" y="321" font-family="'Segoe UI', Arial" font-size="20" font-weight="600" text-anchor="middle" fill="white">🎮 Create Room (Host)</text>
  
  <!-- Secondary Button -->
  <rect x="320" y="370" width="420" height="60" rx="14" fill="url(#secondaryBtn)" filter="url(#cardShadow)"/>
  <text x="530" y="411" font-family="'Segoe UI', Arial" font-size="20" font-weight="600" text-anchor="middle" fill="white">👥 Join Room (Player)</text>
  
  <!-- Network Info Section -->
  <text x="240" y="500" font-family="'Segoe UI', Arial" font-size="18" font-weight="700" fill="#1f2937">📡 Network Info</text>
  
  <rect x="240" y="520" width="800" height="100" rx="12" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="260" y="545" font-family="'Segoe UI', Arial" font-size="14" font-weight="600" fill="#0f172a">Server Address:</text>
  <text x="260" y="570" font-family="'Courier New', monospace" font-size="16" font-weight="600" fill="#6366f1">http://192.168.29.107:3000</text>
  <text x="260" y="595" font-family="'Segoe UI', Arial" font-size="13" fill="#64748b">Share this URL with players on the same WiFi network</text>
  
  <!-- Footer text -->
  <text x="640" y="750" font-family="'Segoe UI', Arial" font-size="14" text-anchor="middle" fill="#94a3b8">Ready to play? Create or join a room to get started!</text>
</svg>
